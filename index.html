<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MiCantón.cr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<!-- PDF + QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --g: #1D9E75; --gd: #0F6E56; --gdd: #085041;
  --b: #185FA5; --bd: #0C447C;
  --pu: #534AB7; --am: #854F0B;
  --bg: #F0EEE9; --surf: #fff;
  --bor: rgba(0,0,0,0.09);
  --t1: #1a1a18; --t2: #5f5e5a; --t3: #9a9892;
  --r: 13px; --rs: 9px;
  --hh: 0px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; background: #ddd; overscroll-behavior: none; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--bg); box-shadow: 0 0 60px rgba(0,0,0,0.15); overflow: hidden; position: relative; }
@media (min-width: 768px) {
  body { background: #e8e8e8; }
  .app { max-width: 420px; box-shadow: 0 0 80px rgba(0,0,0,0.25); border-radius: 12px; margin-top: 16px; height: calc(100vh - 32px); }
}
@media (min-width: 1200px) {
  body { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; background: linear-gradient(135deg,#f0f0f0,#e0e0e0); }
}

/* ── HEADER ── */
.hdr { background: var(--g); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
.hdr-top { padding: 10px 14px 8px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.logo { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
.logo em { color: #9FE1CB; font-style: normal; }
.hdr-right { display: flex; gap: 6px; align-items: center; position: relative; }
.hbtn { font-size: 11px; color: rgba(255,255,255,.85); padding: 4px 10px; border-radius: 20px; border: .5px solid rgba(255,255,255,.3); cursor: pointer; background: transparent; font-family: inherit; }
.hbtn:active { background: rgba(255,255,255,.15); }
.usr-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: var(--surf); border: .5px solid var(--bor); border-radius: var(--r); box-shadow: 0 8px 32px rgba(0,0,0,.18); z-index: 200; min-width: 240px; overflow: hidden; }
.usr-header { background: #0C2B1A; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.usr-av-big { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; border: 2px solid rgba(255,255,255,.3); flex-shrink: 0; }
.usr-nm { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 1px; }
.usr-plan { font-size: 10px; color: rgba(255,255,255,.6); }
.usr-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: .5px solid var(--bor); transition: background .1s; }
.usr-item:last-child { border-bottom: none; }
.usr-item:hover { background: var(--bg); }
.usr-item.active-usr { background: #E1F5EE; }
.usr-ic { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.usr-ic i { font-size: 15px; }
.usr-item-nm { font-size: 12px; font-weight: 600; color: var(--t1); margin-bottom: 1px; }
.usr-item-sub { font-size: 10px; color: var(--t3); }
.usr-check { margin-left: auto; font-size: 14px; color: var(--g); }
.usr-sep { padding: 6px 14px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--t3); background: var(--bg); border-bottom: .5px solid var(--bor); }

/* NEWS TICKER */
.ticker-wrap { background: var(--gdd); overflow: hidden; border-bottom: .5px solid rgba(255,255,255,.1); }
.ticker-inner { display: flex; align-items: center; }
.ticker-label { font-size: 10px; font-weight: 700; color: #9FE1CB; background: var(--g); padding: 5px 10px; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.ticker-label i { font-size: 12px; }
.ticker-scroll { flex: 1; overflow: hidden; }
.ticker-text { display: flex; gap: 0; animation: scroll-ticker 40s linear infinite; white-space: nowrap; }
.ticker-text:hover { animation-play-state: paused; }
.ticker-item { font-size: 11px; color: rgba(255,255,255,.85); padding: 5px 20px; border-right: .5px solid rgba(255,255,255,.1); cursor: pointer; white-space: nowrap; }
.ticker-item:hover { color: #fff; }
@keyframes scroll-ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* CLIMA + CANTON BAR */
.info-bar { background: var(--gdd); display: flex; align-items: center; padding: 5px 12px; gap: 8px; }
.clima-left { display: flex; align-items: center; gap: 6px; padding: 6px 10px 6px 0; border-right: .5px solid rgba(255,255,255,.2); flex-shrink: 0; }
.clima-icon { font-size: 20px; }
.clima-temp { font-size: 16px; font-weight: 700; color: #fff; line-height: 1; }
.clima-desc { font-size: 9px; color: rgba(255,255,255,.7); }
.canton-center { flex: 1; padding: 6px 10px; }
.canton-name { font-size: 12px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 4px; }
.canton-name i { font-size: 13px; color: #9FE1CB; }
.canton-stats { display: flex; gap: 8px; margin-top: 1px; }
.cs { font-size: 9px; color: rgba(255,255,255,.65); display: flex; align-items: center; gap: 2px; }
.cs strong { color: #9FE1CB; }
.clima-right { padding: 6px 0 6px 10px; border-left: .5px solid rgba(255,255,255,.2); flex-shrink: 0; text-align: right; }
.clima-detail { font-size: 10px; color: rgba(255,255,255,.8); line-height: 1.6; }
.clima-detail strong { color: #fff; }

/* PROV / CANT STRIPS */
.prov-strip { display: flex; overflow-x: auto; padding: 0 14px; background: var(--g); gap: 0; scrollbar-width: none; }
.prov-strip::-webkit-scrollbar { display: none; }
.pt { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.7); padding: 6px 12px; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; }
.pt.on { color: #fff; border-color: #9FE1CB; }
.cant-strip { display: flex; gap: 5px; padding: 6px 14px; overflow-x: auto; background: var(--gdd); scrollbar-width: none; }
.cant-strip::-webkit-scrollbar { display: none; }
.ct { font-size: 11px; font-weight: 500; padding: 3px 11px; border-radius: 20px; border: .5px solid rgba(255,255,255,.2); color: rgba(255,255,255,.7); cursor: pointer; white-space: nowrap; }
.ct.on { background: #fff; color: var(--gdd); font-weight: 700; border-color: #fff; }
.ct.pend { opacity: .35; pointer-events: none; }

/* SEARCH */
.search-wrap { padding: 7px 14px 9px; background: var(--g); }
.search-box { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,.18); border-radius: 11px; padding: 7px 12px; border: .5px solid rgba(255,255,255,.2); }
.search-box input { background: transparent; border: none; outline: none; font-size: 12px; color: #fff; flex: 1; font-family: inherit; }
.search-box input::placeholder { color: rgba(255,255,255,.55); }
.search-box i { font-size: 15px; color: rgba(255,255,255,.7); }
.clr-btn { font-size: 14px; color: rgba(255,255,255,.6); cursor: pointer; display: none; }
.clr-btn.show { display: block; }

/* MOD TABS */
.mod-tabs { display: flex; background: var(--surf); border-bottom: .5px solid var(--bor); flex-shrink: 0; align-items: stretch; }
.mod-tabs::-webkit-scrollbar { display: none; }
.mtab { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--t3); padding: 9px 13px; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; }
.mtab i { font-size: 14px; }
.mtab.on { color: var(--g); border-color: var(--g); }

/* CONTENT */
.content { flex: 1; overflow-y: auto; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.1) transparent; }

/* ── CARDS ── */
.card { background: var(--surf); border-radius: var(--r); border: .5px solid var(--bor); overflow: hidden; margin-bottom: 10px; }

/* ── COMPONENTE DE IMÁGENES ── */
.img-uploader { border: 1.5px dashed var(--bor); border-radius: var(--rs); overflow: hidden; background: var(--bg); }
.img-drop-zone { padding: 20px; text-align: center; cursor: pointer; transition: background .15s; }
.img-drop-zone:hover { background: #E1F5EE; border-color: var(--g); }
.img-drop-zone i { font-size: 28px; color: var(--t3); display: block; margin-bottom: 6px; }
.img-drop-zone.has-imgs { padding: 10px; }
.img-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 8px; }
.img-thumb { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--bg); border: .5px solid var(--bor); }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-thumb .img-del { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; background: rgba(0,0,0,.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
.img-thumb .img-del i { font-size: 10px; color: #fff; }
.img-thumb .img-main-badge { position: absolute; bottom: 3px; left: 3px; font-size: 9px; font-weight: 700; background: var(--g); color: #fff; padding: 1px 6px; border-radius: 8px; }
.img-thumb.add-more { border-style: dashed; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--surf); }
.img-thumb.add-more i { font-size: 22px; color: var(--g); }
.img-count-tip { font-size: 10px; color: var(--t3); text-align: center; padding: 4px 0 8px; }

.ch { padding: 10px 14px; border-bottom: .5px solid var(--bor); display: flex; align-items: center; justify-content: space-between; }
.ct2 { font-size: 12px; font-weight: 700; color: var(--t1); display: flex; align-items: center; gap: 5px; }
.ct2 i { font-size: 14px; color: var(--g); }
.seeall { font-size: 11px; color: var(--g); cursor: pointer; font-weight: 600; }
.pad { padding: 12px; }

/* NEWS */
.nfeat { background: #E1F5EE; padding: 12px 14px; border-bottom: .5px solid var(--bor); cursor: pointer; }
.nfeat:active { background: #9FE1CB44; }
.nf-tag { font-size: 10px; font-weight: 700; color: var(--gd); background: #fff; border-radius: 20px; padding: 2px 8px; display: inline-block; margin-bottom: 4px; }
.nf-medio { font-size: 10px; font-weight: 700; color: var(--gd); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.nf-medio i { font-size: 11px; }
.nf-title { font-size: 14px; font-weight: 700; color: var(--gdd); line-height: 1.3; margin-bottom: 4px; }
.nf-meta { font-size: 10px; color: var(--gd); display: flex; gap: 8px; align-items: center; }
.nitem { display: flex; gap: 9px; padding: 10px 14px; border-bottom: .5px solid var(--bor); cursor: pointer; }
.nitem:last-child { border-bottom: none; }
.nitem:active { background: var(--bg); }
.nthumb { width: 56px; height: 56px; border-radius: 9px; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nthumb i { font-size: 20px; color: var(--t3); opacity: .5; }
.ncat { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; display: inline-block; margin-bottom: 3px; }
.ntit { font-size: 12px; font-weight: 600; color: var(--t1); line-height: 1.3; margin-bottom: 3px; }
.nmeta2 { font-size: 10px; color: var(--t3); display: flex; gap: 6px; align-items: center; }
.n-medio-tag { font-size: 10px; font-weight: 600; color: var(--g); display: flex; align-items: center; gap: 2px; }

/* EVENTS */
.evitem { display: flex; gap: 10px; padding: 10px 14px; border-bottom: .5px solid var(--bor); cursor: pointer; align-items: center; }
.evitem:last-child { border-bottom: none; }
.evitem:active { background: var(--bg); }
.efecha { border-radius: 10px; padding: 5px 8px; text-align: center; min-width: 38px; flex-shrink: 0; }
.edia { font-size: 17px; font-weight: 800; line-height: 1; color: #fff; }
.emes { font-size: 9px; color: rgba(255,255,255,.85); text-transform: uppercase; letter-spacing: .5px; }
.enm { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
.eloc { font-size: 10px; color: var(--t3); display: flex; align-items: center; gap: 3px; }
.etag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-left: auto; flex-shrink: 0; }

/* OFERTAS */
.ofgrid { display: grid; grid-template-columns: 1fr 1fr; }
.ofitem { padding: 11px 12px; border-right: .5px solid var(--bor); border-bottom: .5px solid var(--bor); cursor: pointer; }
.ofitem:nth-child(even) { border-right: none; }
.ofitem:nth-last-child(-n+2) { border-bottom: none; }
.ofitem:active { background: var(--bg); }
.of-neg { font-size: 10px; color: var(--t3); margin-bottom: 3px; display: flex; align-items: center; gap: 3px; }
.of-neg i { font-size: 11px; color: var(--g); }
.of-desc { font-size: 12px; font-weight: 600; color: var(--t1); margin-bottom: 5px; line-height: 1.3; }
.of-pill { font-size: 10px; font-weight: 700; border-radius: 20px; padding: 2px 8px; display: inline-block; }

/* NEGOCIOS */
.negitem { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: .5px solid var(--bor); cursor: pointer; }
.negitem:last-child { border-bottom: none; }
.negitem:active { background: var(--bg); }
.nav { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.nnm { font-size: 13px; font-weight: 600; color: var(--t1); }
.ncat2 { font-size: 10px; color: var(--t3); }
.nsoc { display: flex; gap: 3px; margin-left: auto; }
.nsoc i { font-size: 14px; }
.nrat { font-size: 11px; color: var(--am); font-weight: 700; margin-left: 6px; display: flex; align-items: center; gap: 2px; }

/* CLASIFICADOS */
.clsgrid { display: grid; grid-template-columns: 1fr 1fr; }
.clsitem { padding: 10px 11px; border-right: .5px solid var(--bor); border-bottom: .5px solid var(--bor); cursor: pointer; }
.clsitem:nth-child(even) { border-right: none; }
.clsitem:nth-last-child(-n+2) { border-bottom: none; }
.clsitem:active { background: var(--bg); }
.cls-img { height: 50px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
.cls-img i { font-size: 20px; color: var(--t3); opacity: .4; }
.cls-price { font-size: 13px; font-weight: 700; color: var(--b); }
.cls-nm { font-size: 11px; font-weight: 500; color: var(--t1); margin: 1px 0 2px; }
.cls-vf { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 2px; color: var(--g); }

/* EMPLEO */
.jobitem { padding: 11px 13px; border-bottom: .5px solid var(--bor); cursor: pointer; }
.jobitem:last-child { border-bottom: none; }
.jobitem:active { background: var(--bg); }
.jobitem.feat { background: #E1F5EE; border-left: 3px solid var(--g); }
.jt { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 6px; }
.jav { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.jtit { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 2px; line-height: 1.3; }
.jemp { font-size: 10px; color: var(--t3); display: flex; align-items: center; gap: 3px; }
.jemp i { font-size: 11px; color: var(--g); }
.jbadges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 5px; }
.jb { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.jb-t { background: var(--bg); color: var(--t2); }
.jb-s { background: #EAF3DE; color: #3B6D11; }
.jb-u { background: #FCEBEB; color: #A32D2D; }
.jb-n { background: #E1F5EE; color: var(--gd); }
.jb-r { background: #EEEDFE; color: var(--pu); }
.jmeta { font-size: 10px; color: var(--t3); display: flex; gap: 10px; }
.jmeta span { display: flex; align-items: center; gap: 3px; }
.apply-btn { font-size: 11px; font-weight: 700; background: var(--g); color: #fff; border: none; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-family: inherit; flex-shrink: 0; }

/* SERVICIOS */
.srvitem { padding: 12px 13px; border-bottom: .5px solid var(--bor); cursor: pointer; }
.srvitem:last-child { border-bottom: none; }
.srvitem:active { background: var(--bg); }
.srvitem.top { background: #E6F1FB; border-left: 3px solid var(--b); }
.srv-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 6px; }
.srv-av { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; flex-shrink: 0; border: 2px solid transparent; }
.srv-av.vf { border-color: var(--g); }
.srv-nm { font-size: 13px; font-weight: 700; color: var(--t1); display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
.srv-vck { width: 14px; height: 14px; background: var(--g); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.srv-vck i { font-size: 9px; color: #fff; }
.srv-of { font-size: 11px; color: var(--t3); margin-bottom: 3px; }
.srv-stars { display: flex; align-items: center; gap: 3px; }
.srv-stars i { font-size: 12px; color: #EF9F27; }
.srv-stars span { font-size: 11px; color: var(--t3); }
.srv-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 5px; }
.sb { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.sb-z { background: #E6F1FB; color: var(--b); }
.sb-d { background: #EAF3DE; color: #3B6D11; }
.sb-p { background: #FAEEDA; color: var(--am); }
.sb-n { background: #E1F5EE; color: var(--gd); }
.srv-desc { font-size: 11px; color: var(--t3); line-height: 1.4; margin-bottom: 7px; }
.srv-btns { display: flex; gap: 6px; }
.sbtn { flex: 1; font-size: 11px; font-weight: 700; padding: 7px 8px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; font-family: inherit; }
.sbtn.wa { background: #25D366; color: #fff; }
.sbtn.tel { background: var(--bg); color: var(--t1); border: .5px solid var(--bor); }
.sbtn.ver { background: var(--b); color: #fff; }

/* HSCROLL */
.hscroll { display: flex; gap: 9px; padding: 0 12px 12px; overflow-x: auto; scrollbar-width: none; }
.hscroll::-webkit-scrollbar { display: none; }
.hcard { background: var(--surf); border: .5px solid var(--bor); border-radius: var(--r); padding: 11px 12px; min-width: 148px; cursor: pointer; flex-shrink: 0; }
.hcard:active { background: var(--bg); }

/* DETAIL */
.detail { padding: 14px; }
.dback { font-size: 12px; font-weight: 600; color: var(--g); cursor: pointer; display: flex; align-items: center; gap: 4px; margin-bottom: 14px; }
.dhero { display: flex; gap: 12px; margin-bottom: 14px; }
.dav { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; border: 2.5px solid var(--g); }
.dnm { font-size: 17px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
.dsub { font-size: 12px; color: var(--t3); margin-bottom: 5px; }
.dstars { display: flex; align-items: center; gap: 3px; }
.dstars i { font-size: 14px; color: #EF9F27; }
.dbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.dbtn { padding: 11px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; }
.dbtn.wa { background: #25D366; color: #fff; }
.dbtn.tel { background: var(--bg); color: var(--t1); border: .5px solid var(--bor); }
.dbtn.apply { background: var(--g); color: #fff; grid-column: 1/-1; }
.slbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--t3); margin-bottom: 8px; }
.svcs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.svc { background: var(--bg); border-radius: 8px; padding: 8px 10px; }
.svc-nm { font-size: 11px; font-weight: 600; color: var(--t1); margin-bottom: 1px; }
.svc-pr { font-size: 11px; font-weight: 700; color: var(--b); }
.fotos { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-bottom: 14px; }
.foto { aspect-ratio: 1; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.foto i { font-size: 20px; color: var(--t3); opacity: .3; }
.revs { padding: 4px 0; }

var geoModalTipo = 'pais'; // 'pais' | 'prov' | 'cant'
var geoFiltroTexto = '';

function abrirGeoModal(tipo){
  geoModalTipo = tipo;
  geoFiltroTexto = '';
  const modal = G('geoModal');
  if(modal){ modal.style.display='flex'; }
  const titles = {pais:'Seleccionar país', prov:'Seleccionar provincia', cant:'Seleccionar cantón'};
  const subs   = {pais:'Elegí tu país para ver contenido local', prov:'Elegí tu provincia', cant:'Elegí tu cantón o ciudad'};
  if(G('geoModalTitle')) G('geoModalTitle').textContent = titles[tipo]||'Seleccionar';
  if(G('geoModalSub'))   G('geoModalSub').textContent   = subs[tipo]||'';
  if(G('geoSearchInput')){ G('geoSearchInput').value=''; G('geoSearchInput').focus(); }
  renderGeoLista('');
}

function cerrarGeoModal(){
  const modal = G('geoModal');
  if(modal) modal.style.display='none';
}

function filtrarGeoLista(q){
  geoFiltroTexto = q;
  if(G('geoSearchClear')) G('geoSearchClear').style.display = q?'block':'none';
  renderGeoLista(q);
}

function renderGeoLista(q){
  const list = G('geoModalList');
  if(!list) return;
  const ql = q.toLowerCase();
  let items = [];

  if(geoModalTipo==='pais'){
    items = Object.entries(PAISES).map(([nm,p])=>({
      ic: p.flag, nm, sub: Object.keys(p.provincias).length+' provincias · '+p.idioma,
      on: paisActivo===nm,
      onclick: `seleccionarPais('${nm}')`
    }));
  } else if(geoModalTipo==='prov'){
    const p = PAISES[paisActivo]||PAISES['Costa Rica'];
    items = Object.keys(p.provincias).map(prov=>({
      ic: p.flag, nm: prov, sub: p.provincias[prov].length+' cantones',
      on: AP===prov,
      onclick: `seleccionarProv('${prov}')`
    }));
  } else {
    const p = PAISES[paisActivo]||PAISES['Costa Rica'];
    const provCants = p.provincias[AP]||[];
    items = provCants.map(c=>({
      ic: '📍', nm: c, sub: AP+' · '+paisActivo,
      on: AC&&AC.nm===c,
      onclick: `seleccionarCant('${c}')`
    }));
  }

  if(ql) items = items.filter(i=>i.nm.toLowerCase().includes(ql)||i.sub.toLowerCase().includes(ql));

  list.innerHTML = items.map(item=>`
    <div class="geo-item${item.on?' on':''}" onclick="${item.onclick}">
      <span class="gi-ic">${item.ic}</span>
      <div style="flex:1;min-width:0">
        <p class="gi-nm">${item.nm}</p>
        <p class="gi-sub">${item.sub}</p>
      </div>
      ${item.on?'<i class="ti ti-check" style="font-size:16px;color:var(--g)"></i>':'<i class="ti ti-chevron-right" style="font-size:14px;color:var(--bor)"></i>'}
    </div>`).join('') || `<div style="padding:32px;text-align:center;color:var(--t3);font-size:13px">Sin resultados para "${q}"</div>`;
}

function seleccionarPais(nm){
  paisActivo = nm;
  AP = Object.keys(PAISES[nm].provincias)[0];
  AC = DATA[AP]?.[0] || {nm:Object.values(PAISES[nm].provincias)[0][0]};
  cerrarGeoModal();
  updateBar(); updatePaisLabel();
  render();
  showToast('País: '+nm+' '+PAISES[nm].flag);
}

function seleccionarProv(prov){
  AP = prov;
  AC = DATA[prov]?.[0] || {nm:(PAISES[paisActivo]?.provincias[prov]||[])[0]||prov};
  cerrarGeoModal();
  updateBar();
  render();
  showToast('Provincia: '+prov);
}

function seleccionarCant(cant){
  AC = DATA[AP]?.find(c=>c.nm===cant) || {nm:cant,j:0,n:0,s:0,c:0,cli:{t:24,desc:'Soleado',ic:'☀️',hum:65,viento:12,sens:23}};
  cerrarGeoModal();
  updateBar();
  render();
  showToast('Cantón: '+cant);
}

function updatePaisLabel(){
  const p = PAISES[paisActivo];
  if(!p) return;
  // Update all header geo elements
  if(G('paisPillFlag'))  G('paisPillFlag').textContent  = p.flag;
  if(G('paisPillNm'))    G('paisPillNm').textContent    = paisActivo;
  if(G('infoBarFlag'))   G('infoBarFlag').textContent   = p.flag;
  if(G('infoBarPais'))   G('infoBarPais').textContent   = paisActivo.toUpperCase();
  if(G('tickerPaisFlag'))G('tickerPaisFlag').textContent= p.flag;
  if(G('tickerPaisNm'))  G('tickerPaisNm').textContent  = paisActivo.toUpperCase();
}

function getProvinciasCantones(pais, prov){
  const p = PAISES[pais];
  if(!p) return [];
  return p.provincias[prov] || [];
}

// ── QR GENERATOR — real ──
function generarQRCanvas(){
  const canvas=document.getElementById('qrCanvas');
  if(!canvas) return;
  const url=`https://micanton.cr/menu/el-mirador`;
  try {
    // Try QRCode.js
    if(window.QRCode){
      canvas.width=110; canvas.height=110;
      const qr=new QRCode(canvas,{text:url,width:110,height:110,colorDark:'#1a1a1a',colorLight:'#fff'});
    } else {
      _drawFakeQR(canvas, url);
    }
  } catch(e){ _drawFakeQR(canvas, url); }
}

function _drawFakeQR(canvas, url){
  const ctx=canvas.getContext('2d');
  const W=canvas.width||110, H=canvas.height||110;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a1a';
  // Corner squares
  [[2,2],[2,15],[15,2]].forEach(([x,y])=>{
    ctx.fillRect(x*W/25,y*H/25,8*W/25,8*H/25);
    ctx.fillStyle='#fff'; ctx.fillRect((x+1)*W/25,(y+1)*H/25,6*W/25,6*H/25);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect((x+2)*W/25,(y+2)*H/25,4*W/25,4*H/25);
  });
  ctx.fillRect(15*W/25,15*H/25,4*W/25,4*H/25);
  // Data pixels
  const seed=url.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  for(let i=0;i<22;i++) for(let j=0;j<22;j++){
    if((i<9&&j<9)||(i<9&&j>13)||(i>13&&j<9)) continue;
    if((seed*(i*22+j+1))%3===0) ctx.fillRect(i*W/25+1,j*H/25+1,W/25-1,H/25-1);
  }
  // Logo center
  ctx.fillStyle='#fff'; ctx.fillRect(W*.4,H*.4,W*.2,H*.2);
  ctx.fillStyle='#085041'; ctx.font=`bold ${W*.08}px sans-serif`;
  ctx.textAlign='center'; ctx.fillText('MC',W/2,H/2+W*.03);
}

const IMG_STORE = {}; // { key: [{dataUrl, name, size}] }

function imgKey(modulo, id){ return modulo + '_' + (id||'new'); }

function imgPickerHTML(key, maxImgs=6, label='Fotos'){
  const imgs = IMG_STORE[key] || [];
  const mainBadge = (i) => i===0 ? '<span class="img-main-badge">Principal</span>' : '';
  const thumbs = imgs.map((img,i) => `
    <div class="img-thumb">
      <img src="${img.dataUrl}" alt="Foto ${i+1}">
      ${mainBadge(i)}
      <button class="img-del" onclick="imgDelete('${key}',${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
  const addBtn = imgs.length < maxImgs ? `<div class="img-thumb add-more" onclick="imgPick('${key}',${maxImgs})"><i class="ti ti-plus"></i></div>` : '';
  if(!imgs.length){
    return `<div class="img-uploader">
      <div class="img-drop-zone" onclick="imgPick('${key}',${maxImgs})">
        <i class="ti ti-camera-plus"></i>
        <p style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px">${label}</p>
        <p style="font-size:10px;color:var(--t3)">Tocá para agregar fotos · Hasta ${maxImgs} imágenes</p>
        <p style="font-size:10px;color:var(--t3)">JPG, PNG, HEIC · Máx 10MB cada una</p>
      </div>
    </div>`;
  }
  return `<div class="img-uploader">
    <div class="img-drop-zone has-imgs">
      <div class="img-grid">${thumbs}${addBtn}</div>
      <p class="img-count-tip">${imgs.length} de ${maxImgs} fotos · Tocá una para eliminarla · La primera es la principal</p>
    </div>
  </div>`;
}

function imgPick(key, maxImgs){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = (e) => {
    const files = Array.from(e.target.files);
    const current = IMG_STORE[key] || [];
    const remaining = maxImgs - current.length;
    const toLoad = files.slice(0, remaining);
    let loaded = 0;
    toLoad.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        if(!IMG_STORE[key]) IMG_STORE[key] = [];
        IMG_STORE[key].push({ dataUrl: ev.target.result, name: file.name, size: file.size });
        loaded++;
        if(loaded === toLoad.length) render();
      };
      reader.readAsDataURL(file);
    });
    if(toLoad.length < files.length) showToast('Máximo ' + maxImgs + ' fotos por publicación');
  };
  input.click();
}

function imgDelete(key, idx){
  if(IMG_STORE[key]) {
    IMG_STORE[key].splice(idx, 1);
    render();
  }
}

function imgThumbFirst(key){
  const imgs = IMG_STORE[key];
  if(!imgs || !imgs.length) return null;
  return imgs[0].dataUrl;
}

function buildSearchIndex(q){
  const ql = q.toLowerCase().trim();
  const results = [];

  // ── PROVEEDORES UNIFICADOS (negocios + servicios + agencias + locales) ──
  if(searchCat==='todo'||searchCat==='negocios'||searchCat==='servicios'){
    PROVEEDORES.forEach(p=>{
      const catalogTags = p.catalogo.map(c=>c.nm+' '+c.cat).join(' ');
      const hay = (p.nm+' '+p.cat+' '+p.tags+' '+p.zona+' '+p.desc+' '+p.servicios.join(' ')+' '+catalogTags).toLowerCase();
      if(hay.includes(ql)){
        const tb = TIPO_BADGE[p.tipo]||TIPO_BADGE.local;
        results.push({
          tipo:'proveedor', mod:'negocios',
          ic: p.tipo==='independiente'?'ti-user':p.tipo==='agencia'?'ti-sparkles':p.tipo==='empresa'?'ti-building':'ti-building-store',
          bg:p.bg, co:p.co,
          nm:p.nm, sub:p.cat+' · '+p.zona+' · ⭐'+p.rt,
          badge:tb.nm, bc:tb.bg, btc:tb.co,
          accion:p.id, actionType:'proveedor', highlight:ql,
        });
      }
    });
  }

  // ── EMPLEOS ──
  if(searchCat==='todo'||searchCat==='empleo'){
    JOBS.forEach(j=>{
      const hay = (j.tit+' '+j.emp+' '+j.tipo+' '+j.cat+' '+(j.sal||'')).toLowerCase();
      if(hay.includes(ql)){
        results.push({
          tipo:'empleo', mod:'empleo',
          ic:'ti-briefcase', bg:j.bg, co:j.co,
          nm:j.tit, sub:j.emp+' · '+j.tipo+(j.sal?' · '+j.sal:''),
          badge: j.urg?'Urgente':j.nw?'Nuevo':j.rem?'Remoto':'Empleo',
          bc: j.urg?'#FCEBEB':j.nw?'#E1F5EE':j.rem?'#E6F1FB':'#EAF3DE',
          btc: j.urg?'#A32D2D':j.nw?'#0F6E56':j.rem?'#185FA5':'#3B6D11',
          accion: j.id, actionType:'job', highlight:ql,
        });
      }
    });
  }

  // ── CLASIFICADOS ──
  if(searchCat==='todo'||searchCat==='clasificados'){
    CLASIFICADOS_DIR.forEach(c=>{
      const hay = (c.nm+' '+c.cat+' '+c.tags+' '+c.precio).toLowerCase();
      if(hay.includes(ql)){
        const anunc = ANUNCIANTES[c.uid]||{};
        results.push({
          tipo:'clasificado', mod:'clasificados',
          ic:c.ic, bg:'#E6F1FB', co:'#185FA5',
          nm:c.nm, sub:c.cat+' · '+c.precio+' · '+(anunc.nm||c.uid),
          badge:'Clasificado', bc:'#E6F1FB', btc:'#185FA5',
          accion: c.uid, actionType:'perfil', highlight:ql,
        });
      }
    });
  }


  return results;
}

function highlight(text, q){
  if(!q||!text) return text;
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
  return text.replace(re, '<mark style="background:#FAF1B3;color:#42320A;border-radius:2px;padding:0 1px">$1</mark>');
}

let catSubSel = {}; // { modulo: { cat: subcat } }

function setCatSub(modulo, cat, sub){
  if(!catSubSel[modulo]) catSubSel[modulo] = {};
  catSubSel[modulo][cat] = catSubSel[modulo][cat] === sub ? null : sub;
  render();
}

function renderCatBar(modulo, activeCat, setFnStr, color){
  color = color || 'var(--g)';
  const cats = SUBCATS[modulo] || [];
  const activeSubs = cats.find(c=>c.id===activeCat)?.subs || [];
  const activeSubSel = (catSubSel[modulo]||{})[activeCat] || null;

  const catRow = '<div style="display:flex;overflow-x:auto;scrollbar-width:none;background:var(--surf);border-bottom:.5px solid var(--bor);padding:0 2px">'
    + cats.map(c=>{
        const isOn = activeCat===c.id;
        const action = setFnStr.replace('__CAT__', c.id);
        return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;cursor:pointer;border-bottom:2px solid '+(isOn?color:'transparent')+';white-space:nowrap;flex-shrink:0" onclick="'+action+'">'
          +'<i class="ti '+c.ic+'" style="font-size:16px;color:'+(isOn?color:'var(--t3)')+'"></i>'
          +'<span style="font-size:9px;font-weight:600;color:'+(isOn?color:'var(--t3)')+'">'+c.nm+'</span>'
          +'</div>';
      }).join('')
    + '</div>';

  const subRow = activeSubs.length
    ? '<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:7px 12px;background:var(--bg);border-bottom:.5px solid var(--bor)">'
      + activeSubs.map(s=>{
          const on = activeSubSel===s;
          return '<span style="font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;cursor:pointer;background:'+(on?color:'var(--surf)')+';color:'+(on?'#fff':'var(--t3)')+';border:.5px solid '+(on?color:'var(--bor)')+'" onclick="setCatSub(\''+modulo+'\',\''+activeCat+'\',\''+s.replace(/'/g,'&#39;')+'\')">'+s+'</span>';
        }).join('')
      + '</div>'
    : '';

  return catRow + subRow;
}

// SISTEMA DE USUARIOS Y PERMISOS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Tipos de usuario
const TIPOS_USR = {
  visitante:      {perm:['ver']},
  registrado:     {perm:['ver','leer','contactar','reseña','publicar_cv','publicar_empleo','publicar_evento','publicar_oferta']},
  negocio:        {perm:['ver','leer','contactar','reseña','publicar_cv','publicar_empleo','publicar_evento','publicar_oferta','directorio','catalogo','diseno']},
  creativo:       {perm:['ver','leer','contactar','reseña','publicar_cv','publicar_empleo','publicar_evento','publicar_oferta','directorio','diseno','plantillas']},
  medio:          {perm:['ver','leer','contactar','publicar_noticia','directorio']},
  municipalidad:  {perm:['ver','leer','publicar_noticia','publicar_empleo','publicar_evento']},
  admin:          {perm:['todo']},
};

let sesionUsuario = null; // null = visitante
let modalRegistroOpen = false;
let modalRegistroStep = 1;
let modalTipoSel = 'registrado';
let modalAccionPendiente = null;

function tienePermiso(permiso){
  if(!sesionUsuario) return false;
  const t = TIPOS_USR[sesionUsuario.tipo]||TIPOS_USR.visitante;
  return t.perm.includes('todo') || t.perm.includes(permiso);
}

function pedirAcceso(accion, callback){
  if(tienePermiso(accion)||accion==='ver'){
    if(callback) callback();
    return true;
  }
  modalAccionPendiente = callback;
  modalRegistroOpen = true;
  modalRegistroStep = 1;
  render();
  return false;
}

function cerrarModal(){
  modalRegistroOpen = false;
  modalAccionPendiente = null;
  render();
}

function modalSiguiente(){
  if(modalRegistroStep < 3) { modalRegistroStep++; render(); }
  else {
    // Simula login exitoso
    sesionUsuario = {
      tipo: modalTipoSel,
      nm: 'Usuario nuevo',
      av: 'UN',
      bg: '#E6F1FB', co: '#185FA5',
    };
    modalRegistroOpen = false;
    updateUsrBtn();
    rebuildNav();
    showToast('¡Bienvenido! Cuenta creada ✓');
    if(modalAccionPendiente) modalAccionPendiente();
    modalAccionPendiente = null;
    render();
  }
}

function renderModalRegistro(){
  if(!modalRegistroOpen) return '';
  const tipos = [
    {id:'registrado',   ic:'ti-user',                     nm:'Persona',          sub:'Comprar, contactar, reseñas',        bg:'#E6F1FB', co:'#185FA5'},
    {id:'negocio',      ic:'ti-building-store',           nm:'Negocio',          sub:'Perfil en el directorio + publicar', bg:'#E1F5EE', co:'#0F6E56'},
    {id:'creativo',     ic:'ti-palette',                  nm:'Creativo',         sub:'Diseñador, fotógrafo, videógrafo',   bg:'#EEEDFE', co:'#534AB7'},
    {id:'medio',        ic:'ti-building-broadcast-tower', nm:'Medio',            sub:'Publicar noticias · Gratis',         bg:'#E6F1FB', co:'#0C447C'},
    {id:'municipalidad',ic:'ti-map-pin',                  nm:'Municipalidad',    sub:'Institución pública · Gratis',       bg:'#EAF3DE', co:'#3B6D11'},

  const steps = ['Tipo','Datos','Verificar'];
  const stepBar = `<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px">
    ${steps.map((s,i)=>`${i>0?`<div style="width:20px;height:2px;background:${i<modalRegistroStep?'var(--g)':'var(--bor)'}"></div>`:''}
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="width:24px;height:24px;border-radius:50%;background:${i+1<=modalRegistroStep?'var(--g)':'var(--bg)'};border:.5px solid ${i+1<=modalRegistroStep?'var(--g)':'var(--bor)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${i+1<=modalRegistroStep?'#fff':'var(--t3)'}">${i+1<modalRegistroStep?'<i class="ti ti-check" style="font-size:10px"></i>':i+1}</div>
      <span style="font-size:9px;color:${i+1===modalRegistroStep?'var(--g)':'var(--t3)'}">${s}</span>
    </div>`).join('')}
  </div>`;

  let body = '';
  if(modalRegistroStep === 1){
    body = `<p style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px;text-align:center">¿Cómo querés usar MiCantón?</p>

      ${tipos.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);border:${modalTipoSel===t.id?'2px solid var(--g)':'1.5px solid var(--bor)'};cursor:pointer;background:${modalTipoSel===t.id?'#E1F5EE':'var(--surf)'}" onclick="modalTipoSel='${t.id}';render()">

        <div style="flex:1"><p style="font-size:12px;font-weight:600;color:var(--t1)">${t.nm}${t.id==='medio'||t.id==='municipalidad'?'<span style="font-size:9px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:1px 6px;border-radius:10px;margin-left:5px">Gratis</span>':''}</p><p style="font-size:10px;color:var(--t3)">${t.sub}</p></div>
        ${modalTipoSel===t.id?'<i class="ti ti-check" style="font-size:14px;color:var(--g)"></i>':''}
      </div>`).join('')}

  } else if(modalRegistroStep === 2){
    body = `<p style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px;text-align:center">Tus datos básicos</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">

      <div><p style="font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px">Cantón</p>
        <select style="width:100%;font-size:13px;padding:9px 11px;border-radius:var(--rs);border:.5px solid var(--bor);background:var(--bg);color:var(--t1);outline:none;font-family:inherit">
          <option>Alajuela</option><option>San Ramón</option><option>Grecia</option><option>San José</option><option>Heredia</option><option>Cartago</option>
        </select></div>
      ${(modalTipoSel==='medio'||modalTipoSel==='municipalidad')?`<div style="background:#E6F1FB;border:.5px solid #85B7EB;border-radius:var(--rs);padding:9px 12px;font-size:11px;color:var(--bd)"><i class="ti ti-info-circle" style="font-size:13px"></i> Tu cuenta requiere verificación manual por el equipo de MiCantón. Te contactaremos en menos de 24h.</div>`:''}

let loginError='', loginLoading=false, currentUser=null;

function doLogin(){
  const usr=G('loginUser')?.value?.trim()||'';
  const pwd=G('loginPwd')?.value||'';
  if(!usr||!pwd){ loginError='Completá usuario y contraseña'; render(); return; }
  loginLoading=true; loginError=''; render();
  setTimeout(()=>{
    loginLoading=false;
    const isAdmin=(usr==='admin'||usr==='edwin'||usr==='admin@micanton.cr')&&(pwd==='admin123'||pwd==='micanton2025');
    const isNeg=(usr==='negocio'||usr==='elmirador')&&pwd==='negocio123';
    const isUser=usr==='usuario'&&pwd==='123456';
    if(isAdmin){
      currentUser={tipo:'admin',nm:'Edwin Vega',avatar:'EV'};
      MOD='admin'; adminTab='dashboard'; render();
      showToast('¡Bienvenido Edwin! Panel de administración');
    } else if(isNeg){
      currentUser={tipo:'negocio',nm:'El Mirador',avatar:'EM'};
      MOD='negocio'; render();
      showToast('¡Bienvenido! Panel del negocio');
    } else if(isUser){
      currentUser={tipo:'persona',nm:'María Rodríguez',avatar:'MR'};
      MOD='inicio'; render();
      showToast('¡Bienvenida, María!');
    } else {
      loginError='Usuario o contraseña incorrectos. Probá con las credenciales de prueba.';
      render();
    }
  },900);
}

}

carrito = []; // carrito multi-vendedor

function carritoCount(){ return carrito.reduce((a,i)=>a+i.qty,0); }
function carritoTotal(){ return carrito.reduce((a,i)=>a+(i.itemPrNum*i.qty),0); }

function addToCarrito(provId, provNm, provAv, provBg, provCo, itemId, itemNm, itemPr, itemPrNum, tipo){
  const existing = carrito.find(i=>i.provId===provId&&i.itemId===itemId);
  if(existing){ existing.qty++; }
  else { carrito.push({provId,provNm,provAv,provBg,provCo,itemId,itemNm,itemPr,itemPrNum,qty:1,tipo:tipo||'producto'}); }
  updateCarritoBadge();
  showToast('✓ Agregado al carrito · '+itemNm);
  render();
}

function removeFromCarrito(provId, itemId){
  const idx = carrito.findIndex(i=>i.provId===provId&&i.itemId===itemId);
  if(idx>=0){ carrito.splice(idx,1); updateCarritoBadge(); render(); }
}

function updateCarritoQty(provId, itemId, delta){
  const item = carrito.find(i=>i.provId===provId&&i.itemId===itemId);
  if(item){ item.qty=Math.max(0,item.qty+delta); if(item.qty===0) removeFromCarrito(provId,itemId); else { updateCarritoBadge(); render(); } }
}

function updateCarritoBadge(){
  const cnt = carritoCount();
  const badge = document.getElementById('carritoBadge');
  if(badge){ badge.textContent=cnt; badge.style.display=cnt>0?'flex':'none'; }
}

function _drawMenuItemText(ctx,p,cx,y,cw,ch,opts){
  ctx.textAlign='center';
  if(opts.nombre){ ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(Math.min(cw*.12,13))}px system-ui,sans-serif`; ctx.fillText((p.nm||'').substring(0,12),cx,y+ch*.08); }

    ctx.fillStyle='#EF9F27'; _roundRect(ctx,cx-bw/2,y+ch*.11,bw,bh,bh/2); ctx.fill();
    ctx.fillStyle='#1a1a1a'; ctx.font=`700 ${Math.round(bh*.65)}px system-ui,sans-serif`;
    ctx.fillText(p.pr,cx,y+ch*.11+bh*.7);
  }
  ctx.textAlign='left';
}
function _drawCircleEmoji(ctx,p,cx,cy,r){
  ctx.fillStyle='rgba(255,255,255,.08)'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.font=`${Math.round(r*1.0)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(emojiCat(p.cat),cx,cy);
  ctx.textBaseline='alphabetic';
}
function _drawFlyerEmoji(ctx,p,cx,y,cw){
  ctx.font=`${Math.round(cw*.45)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(emojiCat(p?p.cat:''),cx,y); ctx.textBaseline='alphabetic';
}
function _drawFlyerItem(ctx,p,x,y,cw,ch,opts){
  ctx.textAlign='left';
  if(opts.nombre){ ctx.fillStyle='#1a1a1a'; ctx.font=`600 ${Math.round(Math.min(cw*.11,11))}px system-ui,sans-serif`;
    ctx.fillText((p.nm||'').substring(0,10),x+4,y+ch*.7); }
  if(opts.precio){
    ctx.fillStyle='#CC0020'; ctx.font=`700 ${Math.round(Math.min(cw*.12,12))}px system-ui,sans-serif`;
    ctx.fillText(p.pr,x+4,y+ch*.85);
    ctx.fillStyle='rgba(204,0,32,.15)'; _roundRect(ctx,x+2,y+ch*.72,cw-4,ch*.22,4); ctx.fill();
  }
}
function _drawMinimalistItem(ctx,p,idx,x,y,cw,ch,opts){
  // Número
  ctx.fillStyle='#1D9E75'; ctx.font=`700 ${Math.round(cw*.1)}px system-ui,sans-serif`; ctx.textAlign='left';
  ctx.fillText(`0${idx+1}.`,x+4,y+ch*.62);
  if(opts.nombre){ ctx.fillStyle='#1a1a1a'; ctx.font=`700 ${Math.round(Math.min(cw*.11,11))}px system-ui,sans-serif`;
    ctx.fillText((p.nm||'').substring(0,10),x+4,y+ch*.72); }
  if(opts.precio){
    // Chip verde precio
    const pw=cw-8; const ph=Math.round(ch*.14);
    ctx.fillStyle='#1D9E75'; _roundRect(ctx,x+4,y+ch*.78,pw,ph,3); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(ph*.65)}px system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText(p.pr,x+4+pw/2,y+ch*.78+ph*.75);
  }
  ctx.textAlign='left';
}

  if(opts.nombre){ ctx.fillStyle='#1a1a1a'; ctx.font=`600 ${Math.round(Math.min(cw*.11,10))}px system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText((p.nm||'').substring(0,10),x+cw/2,y+ch*.72); }

  if(opts.precio){
    ctx.fillStyle='#CC0020'; _roundRect(ctx,x+3,y+3,cw*.5,Math.round(ch*.2),3); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(Math.min(cw*.12,11))}px system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText(p.pr,x+3+cw*.25,y+3+Math.round(ch*.14));
  }
  if(opts.nombre){ ctx.fillStyle='#1a1a1a'; ctx.font=`600 ${Math.round(Math.min(cw*.1,10))}px system-ui,sans-serif`; ctx.textAlign='left';
    ctx.fillText((p.nm||'').substring(0,10),x+4,y+ch*.75); }
  if(opts.desc&&p.desc){ ctx.fillStyle='#888'; ctx.font=`${Math.round(Math.min(cw*.09,9))}px system-ui,sans-serif`;
    ctx.fillText((p.desc||'').substring(0,18),x+4,y+ch*.87); }
  ctx.textAlign='left';
}


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS DE CANVAS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function _roundRect(ctx,x,y,w,h,r){
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function _fotoHero(ctx,prod,x,y,w,h,opts,smallRound,fullbleed,noRound){
  if(!prod) return;
  const r = noRound?0:fullbleed?0:smallRound?6:10;
  const fotoUrl = imgThumbFirst('cat_item_'+prod.id);
  const em = emojiCat(prod.cat);

  function drawText(){
    if(opts.nombre&&!opts.header){
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`700 ${Math.round(Math.min(w*0.08,14))}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(prod.nm.length>20?prod.nm.substring(0,19)+'…':prod.nm, x+w/2, y+h*0.78);
    }
    if(opts.desc&&prod.desc){
      ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font=`${Math.round(Math.min(w*0.06,11))}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
      const d=prod.desc.length>40?prod.desc.substring(0,39)+'…':prod.desc;
      ctx.fillText(d,x+w/2,y+h*0.88);
    }
  }

  if(fotoUrl){
    const img=new Image();
    img.onload=()=>{
      ctx.save();
      if(r>0){ _roundRect(ctx,x,y,w,h,r); ctx.clip(); }
      ctx.drawImage(img,x,y,w,h);
      // Overlay gradiente suave abajo para texto
      if(opts.nombre||opts.desc){
        const ov=ctx.createLinearGradient(x,y+h*0.6,x,y+h);
        ov.addColorStop(0,'rgba(0,0,0,0)'); ov.addColorStop(1,'rgba(0,0,0,0.65)');
        ctx.fillStyle=ov; ctx.fillRect(x,y,w,h);
      }
      ctx.restore();
      drawText();
    };
    img.onerror=()=>{ _drawEmojiBox(ctx,em,x,y,w,h,r); drawText(); };
    img.src=fotoUrl;
  } else {
    _drawEmojiBox(ctx,em,x,y,w,h,r);
    drawText();
  }
}

function _fotoCircular(ctx,prod,x,y,w,h,opts){
  if(!prod) return;
  const cx=x+w/2, cy=y+h/2, r=Math.min(w,h)/2;
  const fotoUrl=imgThumbFirst('cat_item_'+prod.id);
  const em=emojiCat(prod.cat);
  function drawCircle(draw){
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
    draw(); ctx.restore();
    // Borde dorado
    ctx.strokeStyle='#EF9F27'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }
  if(fotoUrl){
    const img=new Image();
    img.onload=()=>{ drawCircle(()=>ctx.drawImage(img,x,y,w,h)); };
    img.onerror=()=>{ drawCircle(()=>{ ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(x,y,w,h); ctx.font=`${Math.round(r*0.8)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(em,cx,cy); }); };
    img.src=fotoUrl;
  } else {
    drawCircle(()=>{ ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(x,y,w,h); ctx.font=`${Math.round(r*0.8)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(em,cx,cy); });
  }
}

function _drawEmojiBox(ctx,em,x,y,w,h,r){
  ctx.fillStyle='rgba(255,255,255,0.07)';
  if(r>0){ _roundRect(ctx,x,y,w,h,r); ctx.fill(); }
  else { ctx.fillRect(x,y,w,h); }
  ctx.font=`${Math.round(Math.min(w,h)*0.5)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(em,x+w/2,y+h/2);
}

function _badgePrecio(ctx,pr,x,y,w,tc,bg,ac){
  const h=Math.round(w*0.3);
  ctx.fillStyle='rgba(255,255,255,0.95)'; _roundRect(ctx,x,y,w,h,8); ctx.fill();
  ctx.fillStyle=tc; ctx.font=`600 ${Math.round(h*0.28)}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('SOLO',x+w/2,y+h*0.06);
  ctx.fillStyle=ac; ctx.font=`900 ${Math.round(h*0.48)}px system-ui,sans-serif`;
  ctx.fillText(pr,x+w/2,y+h*0.38);
}

function _circuloPrecio(ctx,pr,cx,cy,r,bg,tc){
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(cx,cy,r*0.85,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=tc; ctx.font=`900 ${Math.round(r*0.55)}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(pr.length>7?pr.substring(0,7):pr,cx,cy);
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,r*0.9,0,Math.PI*2); ctx.stroke();
}

function _ctaBtn(ctx,txt,x,y,w,h,bg,tc){
  ctx.fillStyle=bg; _roundRect(ctx,x,y,w,h,h/2); ctx.fill();
  ctx.fillStyle=tc; ctx.font=`700 ${Math.round(h*0.45)}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(txt,x+w/2,y+h/2);
  ctx.textAlign='left';
}

function _barNegocio(ctx,W,y,BAR,bg,tc){
  ctx.fillStyle=bg; ctx.fillRect(0,y,W,BAR);
  ctx.fillStyle=tc; ctx.globalAlpha=0.3; ctx.fillRect(0,y,W,2); ctx.globalAlpha=1;
  const avR=Math.round(BAR*0.27);
  const avX=Math.round(W*0.05)+avR, avY=y+BAR/2;
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.arc(avX,avY,avR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=tc; ctx.font=`700 ${Math.round(avR*0.85)}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('EM',avX,avY);
  ctx.textAlign='left';
  const tx=avX+avR+Math.round(W*0.03);
  ctx.font=`700 ${Math.round(BAR*0.22)}px system-ui,sans-serif`; ctx.textBaseline='middle';
  ctx.fillText('El Mirador Restaurante',tx,y+BAR*0.35);
  ctx.globalAlpha=0.65; ctx.font=`${Math.round(BAR*0.16)}px system-ui,sans-serif`;
  ctx.fillText('micanton.cr · Alajuela',tx,y+BAR*0.68);
  ctx.globalAlpha=1; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function copiarCopy(){
  if(!mktResult) return;
  const cualidades=mktResult.cualidades?'\n\n'+mktResult.cualidades:'';
  const txt=(mktResult.titulo||'')+'\n\n'+(mktResult.copy||'')+cualidades+'\n\n'+(mktResult.cta||'')+(mktResult.hashtags?'\n\n'+mktResult.hashtags:'');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(()=>showToast('Copy completo copiado ✓')).catch(()=>showToast('Copy listo'));

}
function copiarCopyWA(){

function dibujarImagenMkt(){
  const canvas=document.getElementById('mktCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const prods=catalogItems.filter(i=>mktProductosSel.includes(i.id));
  const opts={precio:mktShowPrecio,nombre:mktShowNombre,desc:mktShowDesc,header:mktShowHeader};
  ctx.clearRect(0,0,W,H);
  const plantilla=MKT_PLANTILLAS[mktPlantilla]||MKT_PLANTILLAS[0];
  const fallback=[{id:-1,nm:'Mi producto',pr:'₡3.500',cat:'Casados',desc:'Delicioso y fresco'}];
  try {
    plantilla.draw(ctx,W,H,prods.length>0?prods:fallback,opts);
  } catch(e){ console.error('Canvas draw error:',e); }
}

function descargarImagenMkt(){
  const canvas=document.getElementById('mktCanvas');
  if(!canvas){ showToast('Generá el contenido primero'); return; }
  try{
    const link=document.createElement('a');
    link.download=`marketing-${(MKT_PLANTILLAS[mktPlantilla]?.nm||'post').replace(/\s/g,'-')}-micanton.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('Imagen descargada ✓');
  } catch(e){ showToast('Error al descargar: '+e.message); }
}

function generarConIA(){
  const prods=catalogItems.filter(i=>mktProductosSel.includes(i.id));
  if(!prods.length){ showToast('Seleccioná al menos un producto'); return; }
  const prodNames=prods.map(p=>p.nm+' ('+p.pr+')'+(p.desc?' — '+p.desc:'')).join('\n');
  const tipoLabel={oferta:'oferta especial',promo:'promoción',combo:'combo especial',nuevo:'producto nuevo',evento:'evento especial',destacado:'producto destacado'};
  mktLoading=true; mktResult=''; render();

  const prompt=`Sos un experto en marketing digital para negocios locales en Costa Rica. Generá contenido de redes sociales en español.

Tipo: ${tipoLabel[mktTipoContent]||'oferta'}
Productos:
${prodNames}
Formato: ${mktTipo}
Tono: ${mktTono}
Negocio: El Mirador Restaurante, Alajuela, Costa Rica.

Respondé SOLO con JSON válido, sin backticks, con estas claves exactas:
{
  "titulo": "titular impactante con emoji, máx 8 palabras",
  "copy": "párrafo completo de 3-4 oraciones. Descripción apetitosa y llamativa con emojis. Menciona frescura, calidad o sabor. Incluye urgencia o beneficio clave.",
  "cualidades": "→ Primera cualidad del producto\n→ Segunda cualidad del producto\n→ Tercera cualidad o beneficio",

}`;

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
  })
  .then(r=>r.json())
  .then(d=>{
    const txt=(d.content||[]).map(c=>c.text||'').join('');
    try{
      const clean=txt.replace(/```json?|```/g,'').trim();

      mktResult={titulo:'🔥 ¡'+prods[0].nm+'!',copy:'Un sabor que no podés dejar pasar. 😋 En El Mirador preparamos cada plato con ingredientes frescos del día, con el sazón casero que te hace volver. Hoy tenemos una oferta especial que no te podés perder. ¡Vení o pedí a domicilio!',cualidades:'→ Ingredientes frescos del día\n→ Sazón casero y receta tradicional\n→ Precio justo con porción generosa',cta:'Pedí ahora',hashtags:'#AlajuelaCR #ComidaCasera #ElMirador #Gastronomia #CostaRica'};
    }
    mktLoading=false; render();
    setTimeout(dibujarImagenMkt,150);
  })
  .catch(()=>{
    mktResult={titulo:'🔥 ¡'+prods[0].nm+'!',copy:'Un sabor que no podés dejar pasar. 😋 En El Mirador preparamos cada plato con ingredientes frescos del día, con el sazón casero que te hace volver. Hoy tenemos una oferta especial que no te podés perder. ¡Vení o pedí a domicilio!',cualidades:'→ Ingredientes frescos del día\n→ Sazón casero y receta tradicional\n→ Precio justo con porción generosa',cta:'Pedí ahora',hashtags:'#AlajuelaCR #ComidaCasera #ElMirador #Gastronomia #CostaRica'};
    mktLoading=false; render();
    setTimeout(dibujarImagenMkt,150);
  });
}

// QR generator using canvas
function generateQRCanvas(){
  try {
    const canvas = document.getElementById('qrCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const size = 110;
    // Draw simple QR placeholder pattern
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#1a1a1a';
    // Corners
    [[2,2],[2,18],[18,2]].forEach(([x,y])=>{ctx.fillRect(x*5,y*5,7*5,7*5);ctx.fillStyle='#fff';ctx.fillRect((x+1)*5,(y+1)*5,5*5,5*5);ctx.fillStyle='#1a1a1a';ctx.fillRect((x+2)*5,(y+2)*5,3*5,3*5);});
    ctx.fillRect(18*5,18*5,7*5,7*5);ctx.fillStyle='#fff';ctx.fillRect(19*5,19*5,5*5,5*5);ctx.fillStyle='#1a1a1a';ctx.fillRect(20*5,20*5,3*5,3*5);
    // Random data pattern
    const seed = 'micanton-el-mirador'.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    for(let i=0;i<22;i++){for(let j=0;j<22;j++){if((i<9&&j<9)||(i<9&&j>12)||(i>12&&j<9)) continue;if((seed*(i*22+j+1))%3===0){ctx.fillRect(i*5,j*5,5,5);}}}
    // Center logo area
    ctx.fillStyle='#fff'; ctx.fillRect(45,45,20,20);
    ctx.fillStyle='#1D9E75'; ctx.font='bold 10px system-ui'; ctx.textAlign='center'; ctx.fillText('MC',55,57);
  } catch(e){}
}
function downloadQR(){
  try {
    const canvas = document.getElementById('qrCanvas');
    if(!canvas){ showToast('QR no disponible'); return; }
    const link = document.createElement('a');
    link.download = 'qr-el-mirador.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('QR descargado ✓');
  } catch(e){ downloadQR(); }
}

// ── PLANTILLAS DE CATÁLOGO EN CANVAS ──
function _catHeader(ctx,W,h,hc,tc,nm,sub){
  ctx.fillStyle=hc; ctx.fillRect(0,0,W,h);
  // Avatar
  const av=Math.round(h*.32); const avX=Math.round(W*.06)+av; const avY=h/2;
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.beginPath(); ctx.arc(avX,avY,av,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=tc; ctx.font=`700 ${Math.round(av*.8)}px system-ui,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(nm.substring(0,2).toUpperCase(),avX,avY);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  const tx=avX+av+Math.round(W*.04);
  ctx.font=`700 ${Math.round(h*.22)}px system-ui,sans-serif`; ctx.fillText(nm.substring(0,22),tx,h*.42);
  ctx.globalAlpha=.7; ctx.font=`${Math.round(h*.17)}px system-ui,sans-serif`; ctx.fillText(sub.substring(0,28),tx,h*.72);
  ctx.globalAlpha=1;
  // micanton.cr right
  ctx.fillStyle=tc; ctx.globalAlpha=.5; ctx.textAlign='right'; ctx.font=`${Math.round(h*.14)}px system-ui,sans-serif`;
  ctx.fillText(typeof footer!=='undefined'?footer:'micanton.cr',W-10,h*.55);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

function _catItemRow(ctx,p,x,y,w,h,hc,tc,opts){
  const fotoUrl=imgThumbFirst('cat_item_'+p.id);
  const FOTO_W=opts.foto?Math.round(w*.22):0;
  const fs=Math.round(Math.min(h*.38,13));
  function drawRow(){
    const tx=x+FOTO_W+6;
    if(opts.precio&&p.pr){ ctx.fillStyle=hc; ctx.font=`700 ${fs}px system-ui,sans-serif`; ctx.textAlign='right'; ctx.fillText(p.pr,x+w-4,y+h*.55); }
    if(opts.nombre!==false){ ctx.fillStyle='#1a1a1a'; ctx.font=`600 ${fs}px system-ui,sans-serif`; ctx.textAlign='left'; ctx.fillText((p.nm||'').substring(0,24),tx,y+h*.52); }
    if(opts.desc&&p.desc){ ctx.fillStyle='#888'; ctx.font=`${Math.round(fs*.82)}px system-ui,sans-serif`; ctx.textAlign='left'; ctx.fillText((p.desc||'').substring(0,32),tx,y+h*.78); }
    ctx.fillStyle='#e8e8e8'; ctx.fillRect(x,y+h-1,w,1);
    ctx.textAlign='left';
  }
  if(opts.foto&&fotoUrl){
    const img=new Image(); img.onload=()=>{
      ctx.save(); _roundRect(ctx,x+2,y+2,FOTO_W-4,h-4,4); ctx.clip();
      ctx.drawImage(img,x+2,y+2,FOTO_W-4,h-4); ctx.restore(); drawRow();
    }; img.onerror=()=>{ _drawFlyerEmoji(ctx,p,x+FOTO_W/2,y+h*.5,FOTO_W); drawRow(); }; img.src=fotoUrl;
  } else drawRow();
}


function _catGridItem(ctx,p,x,y,w,h,hc,tc,opts,numeral){
  const fotoUrl = imgThumbFirst('cat_item_'+p.id);
  const FOTO_H  = opts.foto ? Math.round(h*.55) : 0;
  const INFO_Y  = y + FOTO_H;
  const INFO_H  = h - FOTO_H;
  const pad     = 4;
  const fs      = Math.round(Math.min(w*.1, 11));

  function drawInfo(){
    let ty = INFO_Y + Math.round(INFO_H*.12);

    // Número (plantilla Menú Limpio)
    if(numeral !== undefined){
      ctx.fillStyle = hc;
      ctx.font = `700 ${Math.round(w*.11)}px system-ui,sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText('0'+(numeral+1)+'.',x+pad,ty+Math.round(w*.11));
      ty += Math.round(INFO_H*.18);
    }

    // Nombre del producto
    if(opts.nombre !== false){
      const nm_str = (p.nm||'').length > 16 ? p.nm.substring(0,15)+'…' : (p.nm||'');
      ctx.fillStyle = '#1a1a1a';
      ctx.font = `600 ${fs}px system-ui,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(nm_str, x+w/2, ty + fs);
      ty += fs + 3;
    }

    // Descripción (solo si hay espacio y está activada)
    if(opts.desc && p.desc && INFO_H > h*.4){
      const d = p.desc.length > 22 ? p.desc.substring(0,21)+'…' : p.desc;
      ctx.fillStyle = '#888';
      ctx.font = `${Math.round(fs*.85)}px system-ui,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(d, x+w/2, ty + Math.round(fs*.9));
      ty += Math.round(fs*.9) + 3;
    }

    // Precio — badge de color
    if(opts.precio && p.pr){
      const ph  = Math.round(Math.min(INFO_H*.22, 18));
      const pw  = w - pad*2;
      const py  = y + h - ph - pad;
      ctx.fillStyle = hc;
      _roundRect(ctx, x+pad, py, pw, ph, 3);
      ctx.fill();
      ctx.fillStyle = tc;
      ctx.font = `700 ${Math.round(ph*.65)}px system-ui,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.pr, x+w/2, py + ph*.75);
    }

    ctx.textAlign = 'left';
  }

  if(opts.foto && fotoUrl){
    const img = new Image();
    img.onload = ()=>{
      ctx.save();
      _roundRect(ctx, x+2, y+2, w-4, FOTO_H-4, 6);
      ctx.clip();
      ctx.drawImage(img, x+2, y+2, w-4, FOTO_H-4);
      ctx.restore();
      drawInfo();
    };
    img.onerror = ()=>{ _drawFlyerEmoji(ctx, p, x+w/2, y+(FOTO_H||h)*.42, w*.75); drawInfo(); };
    img.src = fotoUrl;
  } else {
    _drawFlyerEmoji(ctx, p, x+w/2, y+(FOTO_H||h)*.38, w*.75);
    drawInfo();
  }
}

// ── ESTILO 1: Menú Especial (oscuro + fotos circulares) ──
function _catMenuEspecial(ctx,W,H,items,hc,tc,nm,sub,opts,texts){
  const titulo=(texts&&texts.titulo)||nm; const badge=(texts&&texts.badge)||""; const footer=(texts&&texts.footer)||"micanton.cr";
  const HDR=Math.round(H*.14);
  if(opts.header) _catHeader(ctx,W,HDR,hc,tc,nm,sub);
  ctx.fillStyle='#1c1c1c'; ctx.fillRect(0,HDR,W,H-HDR);
  ctx.globalAlpha=.05; ctx.fillStyle='#fff';
  for(let i=0;i<10;i++) for(let j=0;j<10;j++) if((i+j)%2===0) ctx.fillRect(i*W/10,HDR+j*(H-HDR)/10,W/10,(H-HDR)/10);
  ctx.globalAlpha=1;
  if(opts.header){ ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fillRect(0,HDR,W,1); }
  const n=Math.min(items.length,6); const cols=n<=3?n:3; const rows=Math.ceil(n/cols);
  const cw=W/cols; const avail=H-HDR; const ch=avail/rows;
  items.slice(0,6).forEach((p,i)=>{
    const col=i%cols; const row=Math.floor(i/cols);
    const cx2=cw*col+cw/2; const cy2=HDR+ch*row+ch*.38;
    const r=Math.min(cw,ch)*.28;
    const fotoUrl=imgThumbFirst('cat_item_'+p.id);
    function drawCircText(){
      ctx.textAlign='center';
      if(opts.nombre){ ctx.fillStyle='#fff'; ctx.font=`600 ${Math.round(Math.min(cw*.09,12))}px system-ui,sans-serif`; ctx.fillText((p.nm||'').substring(0,12),cx2,cy2+r+ch*.1); }
      if(opts.precio){
        const bw=cw*.65; const bh=Math.round(ch*.1);
        ctx.fillStyle=hc; _roundRect(ctx,cx2-bw/2,cy2+r+ch*.13,bw,bh,bh/2); ctx.fill();
        ctx.fillStyle=tc; ctx.font=`700 ${Math.round(bh*.65)}px system-ui,sans-serif`;
        ctx.fillText(p.pr,cx2,cy2+r+ch*.13+bh*.75);
      }
      ctx.textAlign='left';
    }
    if(opts.foto&&fotoUrl){
      const img=new Image(); img.onload=()=>{
        ctx.save(); ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2); ctx.clip();
        ctx.drawImage(img,cx2-r,cy2-r,r*2,r*2); ctx.restore();
        ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2); ctx.stroke();
        drawCircText();
      }; img.onerror=()=>{ _drawCircleEmoji(ctx,p,cx2,cy2,r); drawCircText(); }; img.src=fotoUrl;
    } else { _drawCircleEmoji(ctx,p,cx2,cy2,r); drawCircText(); }
  });
}

function _catCartaRestaurante(ctx,W,H,items,hc,tc,nm,sub,opts,texts){

  const HDR=Math.round(H*.14); const BG='#111';
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#1a1a1a'); g.addColorStop(1,'#0d0800');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(opts.header){
    ctx.fillStyle=hc||'#EF9F27'; ctx.fillRect(0,0,W,4);
    ctx.fillStyle='#fff'; ctx.font=`900 ${Math.round(W*.08)}px system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText(nm.toUpperCase().substring(0,20),W/2,HDR*.55);

    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font=`${Math.round(W*.035)}px system-ui,sans-serif`;
    ctx.fillText(sub,W/2,HDR*.82); ctx.textAlign='left';
  }
  const half=Math.ceil(items.length/2);
  [[items.slice(0,half),W*.03],[items.slice(half),W*.53]].forEach(([list,sx])=>{
    let ty=HDR+(opts.header?H*.08:H*.04);
    const rowH=Math.min((H-ty-.06*H)/Math.max(list.length,1), H*.18);
    list.forEach(p=>{
      const rfs=Math.round(Math.min(rowH*.3,13));

      ctx.fillStyle=hc||'#EF9F27'; ctx.font=`600 ${Math.round(rfs*.9)}px system-ui,sans-serif`; ctx.textAlign='left';
      ctx.fillText('★',sx,ty+rowH*.35);

      if(opts.nombre!==false){ ctx.fillStyle='#fff'; ctx.font=`700 ${rfs}px system-ui,sans-serif`; ctx.fillText((p.nm||'').substring(0,18),sx+rfs*1.2,ty+rowH*.35); }

      if(opts.precio&&p.pr){ ctx.fillStyle=hc||'#EF9F27'; ctx.textAlign='right'; ctx.font=`700 ${rfs}px system-ui,sans-serif`; ctx.fillText(p.pr,sx+W*.44,ty+rowH*.35); ctx.textAlign='left'; }
      // Descripción

      // Separador
      ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(sx,ty+rowH*.8,W*.44,1);
      ty+=rowH;
    });
  });
}

function _catFreshHero(ctx,W,H,items,hc,tc,nm,sub,opts,texts){
  const titulo=(texts&&texts.titulo)||nm; const badge=(texts&&texts.badge)||""; const footer=(texts&&texts.footer)||"micanton.cr";
  ctx.fillStyle='#f8f8f8'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=hc||'#1D4A1D'; ctx.fillRect(0,0,W,H*.25);
  if(opts.header){
    ctx.fillStyle='#fff'; ctx.font=`900 ${Math.round(W*.09)}px system-ui,sans-serif`; ctx.textAlign='left';
    ctx.fillText(titulo||'FRESCO',W*.04,H*.12);
    ctx.fillStyle='#9FE1CB'; ctx.font=`900 ${Math.round(W*.06)}px system-ui,sans-serif`;
    ctx.fillText(badge||'& NATURAL',W*.04,H*.2);
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font=`${Math.round(W*.03)}px system-ui,sans-serif`;
    ctx.fillText(nm,W*.04,H*.24); ctx.textAlign='left';
  }
  // Hero foto
  const heroUrl=imgThumbFirst('cat_item_'+(items[0]?.id||0));
  function drawBody(){
    ctx.fillStyle='#CC0020'; _roundRect(ctx,W*.25,H*.28,W*.5,H*.09,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(W*.04)}px system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText(badge||'DESCUENTO ESPECIAL',W/2,H*.34); ctx.textAlign='left';
    const leftItems=items.slice(1); const n=Math.min(leftItems.length,6); const cols=3; const rows=Math.ceil(n/cols);
    const pad=7; const cw=(W-pad*(cols+1))/cols; const ch=(H*.55)/rows;
    leftItems.slice(0,6).forEach((p,i)=>{
      const col=i%cols; const row=Math.floor(i/cols);
      const x=pad+col*(cw+pad); const y=H*.4+row*(ch+pad);
      ctx.fillStyle='#fff'; _roundRect(ctx,x,y,cw,ch,6); ctx.fill(); ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=.5; ctx.stroke();
      _catGridItem(ctx,p,x,y,cw,ch,'#CC0020','#fff',opts);
    });
  }
  if(heroUrl&&opts.foto){
    const img=new Image(); img.onload=()=>{
      ctx.save(); ctx.beginPath(); ctx.rect(W*.55,H*.02,W*.44,H*.22); ctx.clip();
      ctx.drawImage(img,W*.55,H*.02,W*.44,H*.22); ctx.restore(); drawBody();
    }; img.onerror=drawBody; img.src=heroUrl;
  } else drawBody();
}

function toggleUsrMenu(){
  const ov = G('usrOverlay');
  if(!ov) return;
  const isOpen = ov.style.display === 'flex';
  if(isOpen){ closeUsrMenu(); }
  else { buildUsrPanel(); ov.style.display='flex'; }
}

function closeUsrMenu(){
  const ov = G('usrOverlay');
  if(ov) ov.style.display='none';
}

function switchUsr(i){
  activeUsr = i;
  closeUsrMenu();
  updateUsrBtn();
  const dest = USR_TIPOS[i].mod;
  const directMods=['inicio','noticias','negocios','eventos','ofertas','clasificados','empleo','servicios','medio','profesional','equipos','pagos','publicar'];
  if(dest==='admin'){ MOD='admin'; adminTab='dashboard'; adminDetail=null; }
  else if(dest==='negocio'){ MOD='negocio'; pnTab='solicitar'; }
  else if(dest==='disenador'){ MOD='disenador'; disTab='cola'; }
  else if(directMods.includes(dest)){ MOD=dest; }
  else { MOD='inicio'; }
  render();
  rebuildNav();
  showToast('Vista: ' + USR_TIPOS[i].nm);
}

  pagos:       ['inicio','pagos','negocio'],
};

const USR_ROL = ['visitante','admin','negocio','disenador','medio','profesional','anunciante','equipos','pagos'];

function getMod(id){ return ALL_MODS.find(m=>m.id===id)||{id,nm:id,ic:'ti-circle'}; }

function buildModTabs(){
  const el = G('modTabs');
  if(!el) return;
  el.className = 'mod-tabs';
  // Barra superior SIEMPRE la misma — módulos de la app
  el.innerHTML = `
    <button onclick="scrollModTabs(-120)" style="background:none;border:none;border-right:.5px solid var(--bor);padding:0 8px;cursor:pointer;color:var(--t3);flex-shrink:0;display:flex;align-items:center"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
    <div id="modTabsInner" style="display:flex;overflow-x:auto;scrollbar-width:none;flex:1">
      ${APP_TABS.map(tid=>{
        const m=getMod(tid);
        const isOn=MOD===tid;
        return `<div class="mtab${isOn?' on':''}" onclick="goMod('${tid}')"><i class="ti ${m.ic}"></i>${m.nm}</div>`;
      }).join('')}
    </div>
    <button onclick="scrollModTabs(120)" style="background:none;border:none;border-left:.5px solid var(--bor);padding:0 8px;cursor:pointer;color:var(--t3);flex-shrink:0;display:flex;align-items:center"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>`;
}

function scrollDirTabs(px){ const el=G("dirTabsInner"); if(el) el.scrollBy({left:px,behavior:"smooth"}); }
function scrollModTabs(px){
  const el = G('modTabsInner');
  if(el) el.scrollBy({left:px, behavior:'smooth'});
}

function scrollNavBot(px){
  const el = G('navbotInner');
  if(el) el.scrollBy({left:px, behavior:'smooth'});
}

function buildNavBot(){
  const rol = USR_ROL[activeUsr]||'visitante';
  let navIds = ROLE_NAV[rol]||ROLE_NAV.visitante;
  const el = G('navbot');
  if(!el) return;

  // Generar botones personales
  const btns = navIds.map(tid=>{
    // Tabs especiales del admin
    if(tid==='ingresos_admin')  return `<button class="nb${MOD==='admin'&&adminTab==='ingresos'?' on':''}"  onclick="setAdminTab('ingresos')"  style="flex-shrink:0;min-width:60px"><i class="ti ti-coins"></i><span>Ingresos</span></button>`;
    if(tid==='cantones_admin')  return `<button class="nb${MOD==='admin'&&adminTab==='cantones'?' on':''}"  onclick="setAdminTab('cantones')"  style="flex-shrink:0;min-width:60px"><i class="ti ti-map-pin"></i><span>Cantones</span></button>`;
    if(tid==='disenos_admin')   return `<button class="nb${MOD==='admin'&&adminTab==='disenos'?' on':''}"   onclick="setAdminTab('disenos')"   style="flex-shrink:0;min-width:60px"><i class="ti ti-photo"></i><span>Diseños</span></button>`;
    // Tabs rápidas del panel del negocio
    if(tid==='pedidos_nav')     return `<button class="nb${MOD==='negocio'&&pnTab==='pedidos'?' on':''}"    onclick="MOD='negocio';setPnTab('pedidos')"    style="flex-shrink:0;min-width:60px;position:relative"><i class="ti ti-inbox"></i><span>Pedidos</span>${pedidosRecibidos.filter(p=>p.st==='nuevo').length>0?`<span style="position:absolute;top:5px;right:8px;width:7px;height:7px;background:#E24B4A;border-radius:50%;border:1.5px solid var(--surf)"></span>`:''}</button>`;
    if(tid==='missolicitudes_nav') return `<button class="nb${MOD==='negocio'&&pnTab==='missolicitudes'?' on':''}" onclick="MOD='negocio';setPnTab('missolicitudes')" style="flex-shrink:0;min-width:60px"><i class="ti ti-list-check"></i><span>Mis pedidos</span></button>`;
    if(tid==='catalogo_nav')    return `<button class="nb${MOD==='negocio'&&pnTab==='catalogo'?' on':''}"   onclick="MOD='negocio';setPnTab('catalogo')"   style="flex-shrink:0;min-width:60px"><i class="ti ti-package"></i><span>Catálogo</span></button>`;
    const m=getMod(tid);
    const isOn=MOD===tid;
    return `<button class="nb${isOn?' on':''}" onclick="goMod('${tid}')" style="flex-shrink:0;min-width:60px"><i class="ti ${m.ic}"></i><span>${m.nm}</span></button>`;
  }).join('');

  el.innerHTML = `
    <button onclick="scrollNavBot(-100)" style="background:none;border:none;border-right:.5px solid var(--bor);padding:0 8px;cursor:pointer;color:var(--t3);flex-shrink:0;height:100%;display:flex;align-items:center"><i class="ti ti-chevron-left" style="font-size:15px"></i></button>
    <div id="navbotInner" style="display:flex;overflow-x:auto;scrollbar-width:none;flex:1;height:100%;align-items:stretch">
      ${btns}
    </div>
    <button onclick="scrollNavBot(100)" style="background:none;border:none;border-left:.5px solid var(--bor);padding:0 8px;cursor:pointer;color:var(--t3);flex-shrink:0;height:100%;display:flex;align-items:center"><i class="ti ti-chevron-right" style="font-size:15px"></i></button>`;
}

function rebuildNav(){
  buildModTabs();
  buildNavBot();
}



buildProv(); buildCant(); updateBar(); render();
setTimeout(()=>{ updateUsrBtn(); rebuildNav(); updatePaisLabel(); }, 50);
</script>
</body>
</html>
